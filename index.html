<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I'm So Sorry</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffe0f0;
        --blush: #ffb3d9;
        --pink: #ff69b4;
        --deep: #c2185b;
        --ink: #5c1a3a;
        --card: #fff0f8;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "Lora", serif;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 182, 220, 0.55) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 75%,
            rgba(255, 105, 180, 0.25) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 55% 5%,
            rgba(255, 224, 240, 0.7) 0%,
            transparent 40%
          );
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 680px;
        width: 92%;
        margin: 40px auto;
        background: var(--card);
        border-radius: 28px;
        padding: 56px 48px 48px;
        box-shadow:
          0 4px 6px rgba(194, 24, 91, 0.06),
          0 20px 60px rgba(194, 24, 91, 0.18),
          0 0 0 2px rgba(255, 179, 217, 0.6);
        animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .page::before {
        content: "";
        position: absolute;
        top: -2px;
        left: 0;
        right: 0;
        height: 18px;
        background: var(--card);
        border-radius: 28px 28px 0 0;
        clip-path: polygon(
          0% 100%,
          3% 40%,
          6% 80%,
          9% 20%,
          13% 70%,
          17% 30%,
          21% 60%,
          25% 10%,
          29% 50%,
          33% 85%,
          37% 25%,
          41% 65%,
          45% 15%,
          49% 55%,
          53% 90%,
          57% 35%,
          61% 70%,
          65% 20%,
          69% 60%,
          73% 40%,
          77% 75%,
          81% 15%,
          85% 55%,
          89% 30%,
          93% 65%,
          97% 45%,
          100% 70%,
          100% 100%
        );
      }

      .header {
        text-align: center;
        margin-bottom: 36px;
        animation: fadeUp 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .sorry-big {
        font-family: "Caveat", cursive;
        font-size: clamp(52px, 10vw, 76px);
        font-weight: 700;
        color: var(--pink);
        line-height: 1;
        display: block;
        width: 100%;
        text-align: center;
        letter-spacing: -1px;
        text-shadow: 0 2px 12px rgba(255, 105, 180, 0.3);
      }

      .subtitle {
        font-family: "Lora", serif;
        font-style: italic;
        color: var(--deep);
        opacity: 0.65;
        margin-top: 6px;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 11px;
      }

      .images-row {
        display: flex;
        gap: 20px;
        margin: 32px 0;
        align-items: flex-end;
        animation: fadeUp 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .img-wrap {
        flex: 1;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(194, 24, 91, 0.18);
        border: 3px solid rgba(255, 179, 217, 0.7);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .img-wrap:hover {
        transform: scale(1.03) rotate(-1deg);
      }
      .img-wrap:nth-child(2):hover {
        transform: scale(1.03) rotate(1deg);
      }

      .img-wrap img {
        width: 100%;
        display: block;
        object-fit: cover;
      }
      .img-wrap:first-child {
        flex: 1.3;
      }
      .img-wrap:last-child {
        flex: 0.9;
      }

      .message {
        animation: fadeUp 0.9s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .message p {
        color: var(--ink);
        font-size: 16px;
        line-height: 1.85;
        margin-bottom: 16px;
        opacity: 0.88;
      }

      .message p:last-child {
        margin-bottom: 0;
      }

      .handwritten {
        font-family: "Caveat", cursive;
        font-size: 22px;
        color: var(--pink);
        display: block;
        text-align: center;
        margin: 28px 0 20px;
        line-height: 1.4;
      }

      .hearts {
        text-align: center;
        font-size: 22px;
        margin-top: 28px;
        animation: fadeUp 0.9s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        letter-spacing: 6px;
      }

      .hearts span {
        display: inline-block;
        animation: pulse 2s ease-in-out infinite;
      }
      .hearts span:nth-child(2) {
        animation-delay: 0.3s;
      }
      .hearts span:nth-child(3) {
        animation-delay: 0.6s;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.35);
        }
      }

      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(
          to right,
          transparent,
          var(--blush),
          transparent
        );
        margin: 24px auto;
      }

      /* SVG cat paw prints */
      .paw {
        position: absolute;
        opacity: 0.1;
        pointer-events: none;
      }
      .paw-1 {
        top: 18px;
        left: 22px;
        transform: rotate(-20deg) scale(0.9);
      }
      .paw-2 {
        top: 55px;
        right: 26px;
        transform: rotate(15deg) scale(1);
      }
      .paw-3 {
        bottom: 38px;
        left: 36px;
        transform: rotate(10deg) scale(0.85);
      }
      .paw-4 {
        bottom: 75px;
        right: 18px;
        transform: rotate(-30deg) scale(0.95);
      }
    </style>
  </head>
  <body>
    <!-- Cat paw SVG template (reused via inline SVG) -->
    <svg style="display: none">
      <symbol id="catpaw" viewBox="0 0 60 70">
        <!-- Main pad -->
        <ellipse cx="30" cy="52" rx="14" ry="12" fill="currentColor" />
        <!-- Toe beans -->
        <ellipse cx="14" cy="34" rx="7" ry="6" fill="currentColor" />
        <ellipse cx="26" cy="27" rx="7" ry="6" fill="currentColor" />
        <ellipse cx="39" cy="27" rx="7" ry="6" fill="currentColor" />
        <ellipse cx="50" cy="35" rx="6" ry="5.5" fill="currentColor" />
      </symbol>
    </svg>

    <div class="page">
      <svg class="paw paw-1" width="52" height="62" style="color: var(--deep)">

      </svg>
      <svg class="paw paw-3" width="52" height="62" style="color: var(--deep)">
        <use href="#catpaw" />
      </svg>
      <svg class="paw paw-4" width="52" height="62" style="color: var(--deep)">
        <use href="#catpaw" />
      </svg>
